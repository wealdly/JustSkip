; JustSkip v2.2 — Game speed control for Crimson Desert

; ── General ──────────────────────────────────────────────────

[Settings]
Enabled=1              ; 0 to disable mod entirely
DebugLog=0             ; 1 to write JustSkip.log for troubleshooting
ReloadKey=75           ; Key to hot-reload this INI (default: F6). 00 = disabled.

; Gamepad — hold Back + button. Set GamepadEnabled=0 to skip entirely.
GamepadEnabled=1       ; 0 = keyboard only (skips XInput loading and polling)
GamepadModifier=0020   ; Back/View (hold first)
GamepadReloadButton=0000 ; disabled
GamepadIndex=0         ; Controller index 0-3 (auto-detected)

; Hold-key safety
MaxHoldSeconds=120     ; Force-release holds after N seconds (0 = no limit)
HoldFocusCheck=1       ; Release holds when game loses focus
StartupGraceSeconds=10  ; Ignore speed changes for N seconds after launch

; ── OSD ──────────────────────────────────────────────────────

[OSD]
Enabled=1
Duration=2000          ; ms to show notification
FontSize=22
PosX=40                ; Offset from top-left of game window
PosY=40

; ── Combat Detection (optional) ──────────────────────────────
;
; Detects combat via vibration, LT+attack, or rapid mashing
; and overrides speed. Any signal triggers; exits after Timeout.

[Combat]
Enabled=0
CombatSpeed=1.0        ; Speed during combat (0.95 = subtle slow-mo)
Timeout=3000           ; ms after last signal to exit combat

VibrationThreshold=5000 ; Intensity threshold (0-65535). Combat >5000, riding <5000.
AttackButtons=C200      ; XInput mask: X(4000)+Y(8000)+RB(0200)
MashCount=3             ; N presses within MashWindow = combat
MashWindow=2000

; AOB signature for perfect detection (leave blank for signal fusion)
; Example: SignaturePattern=48 8B 05 ?? ?? ?? ?? 80 78 1A 01
SignaturePattern=
SignatureOffset=0       ; Byte offset to RIP-relative displacement

; ── Speed Slots ──────────────────────────────────────────────
;
; Hotkey/GamepadButton = hex code (see reference below)
; Hold = 0 toggle (mutually exclusive), 1 hold (overrides toggles)
; Speed = multiplier (1.0 = normal)

[Speed1]               ; F7 / Back+X — subtle always-on speedup
Hotkey=76
GamepadButton=4000
Hold=0
Speed=1.2

[Speed2]               ; F8 — travel, looting
Hotkey=77
GamepadButton=0000
Hold=0
Speed=2.0

[Speed3]               ; F9 / Back+A — cutscenes, crafting
Hotkey=78
GamepadButton=1000
Hold=0
Speed=4.0

[Speed4]               ; F10 — burst (hold, keyboard only)
Hotkey=79
GamepadButton=0000
Hold=1
Speed=8.0

; [Speed5]
; Hotkey=00
; GamepadButton=0000
; Hold=1
; Speed=8.0

; ── Key Reference ────────────────────────────────────────────
;
; Keyboard (hex VK):
;   F1-F12: 70-7B   A-Z: 41-5A   0-9: 30-39   Num0-9: 60-69
;   Shift=10 Ctrl=11 Alt=12 Tab=09 Space=20 Esc=1B Enter=0D
;
; Gamepad (hex XInput):
;   D-pad: Up=0001 Down=0002 Left=0004 Right=0008
;   Start=0010 Back=0020 LS=0040 RS=0080
;   LB=0100 RB=0200 A=1000 B=2000 X=4000 Y=8000
