; ============================================================
;  JustSkip v1.0 — Configuration
;  Game speed control for Crimson Desert
;  by wealdly
; ============================================================

[Settings]

; Master switch — set to 0 to disable the entire mod
Enabled=1

; Write a log file next to the .asi for troubleshooting
DebugLog=0

; Press this key to reload the INI without restarting the game.
; Set to 00 to disable. Default: F6 (75).
ReloadKey=75

; ============================================================
;  Speed Slots (Speed1 through Speed6)
;
;  Hotkey = Hex VK code for the keyboard key
;  Hold   = 0 for toggle (press on/off), 1 for momentary (held)
;  Speed  = Multiplier (1.0 = normal, 2.0 = double speed, etc.)
;
;  Toggle slots are mutually exclusive — activating one
;  deactivates the others. Press again to return to 1x.
;  Hold slots override toggles while the key is held.
; ============================================================

; --- F7: Subtle everyday speedup (toggle) ---
[Speed1]
Hotkey=76
Hold=0
Speed=1.2

; --- F8: 2x speed for travel / looting (toggle) ---
[Speed2]
Hotkey=77
Hold=0
Speed=2.0

; --- F9: 4x speed for cutscenes / long waits (toggle) ---
[Speed3]
Hotkey=78
Hold=0
Speed=4.0

; --- F10: 12x burst — hold to blast through anything ---
[Speed4]
Hotkey=79
Hold=1
Speed=12.0

; --- Unused slots (uncomment and configure as needed) ---
; [Speed5]
; Hotkey=00
; Hold=0
; Speed=1.5

; [Speed6]
; Hotkey=00
; Hold=1
; Speed=8.0

; ============================================================
;  Keyboard Key Reference (hex VK codes)
; ============================================================
;
;  F-Keys:     F1=70  F2=71  F3=72  F4=73  F5=74  F6=75
;              F7=76  F8=77  F9=78  F10=79 F11=7A F12=7B
;
;  Letters:    A=41 B=42 ... Z=5A
;  Numbers:    0=30 1=31 ... 9=39
;  Numpad:     Num0=60 Num1=61 ... Num9=69
;
;  Modifiers:  Shift=10  Ctrl=11  Alt=12
;  Special:    Tab=09  Esc=1B  Space=20  Enter=0D
